<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7769 收益計算 - 92張版</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-red: #FF3B30; --ios-gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 10px; margin: 0; }
        .card { max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin: 10px auto; }
        h2 { text-align: center; margin-top: 0; font-size: 18px; color: #1c1c1e; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; color: var(--ios-gray); font-size: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 15px; box-sizing: border-box; background: #fff; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end; }
        .batch-box { background: #f8f8fb; padding: 10px; border-radius: 14px; border: 1px solid #eee; margin-bottom: 8px; }
        .batch-title { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 2px; display: flex; justify-content: space-between; }
        .batch-info { font-size: 11px; color: var(--ios-gray); }
        .btn-fetch { background: #e5e5ea; color: var(--ios-blue); border: none; border-radius: 10px; padding: 10px; font-weight: 600; font-size: 13px; height: 40px; cursor: pointer; }
        .btn-calc { background: var(--ios-blue); color: white; border: none; border-radius: 12px; width: 100%; padding: 14px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .result { margin-top: 15px; }
        .summary-box { background: #e8f2ff; padding: 15px; border-radius: 14px; border: 1px solid #d0e3ff; margin-bottom: 15px; text-align: center; }
        .sim-box { background: #fff9e6; padding: 15px; border-radius: 14px; border: 1px solid #ffeeba; margin-bottom: 15px; text-align: center; }
        .detail-card { background: white; padding: 12px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 10px; font-size: 13px; }
        .line { display: flex; justify-content: space-between; margin-bottom: 5px; color: #3a3a3c; }
        .val-big { font-size: 24px; color: var(--ios-green); font-weight: 800; }
        .val-daily { font-size: 22px; color: var(--ios-red); font-weight: 700; }
        .sub-title { font-weight: 700; color: var(--ios-blue); margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>7769 鴻勁 收益明細 (92張)</h2>
    
    <div class="row">
        <div class="group" style="flex:2">
            <label>成交價 (最新股價)</label>
            <input type="number" id="price" value="3865">
        </div>
        <button class="btn-fetch" onclick="fetchPrice()">雲端抓取</button>
    </div>

    <div class="group">
        <label>結束日期 (結算點)</label>
        <input type="date" id="endDate">
    </div>

    <div class="batch-box" style="background: #f2fff2;">
        <div class="batch-title"><span>區間一：1 張 (1.5%)</span><span id="dDisplay1"></span></div>
        <div class="batch-info">2026/04/13 起</div>
    </div>
    <div class="batch-box" style="background: #f2faff;">
        <div class="batch-title"><span>區間二：50 張 (1.25%)</span><span id="dDisplay2"></span></div>
        <div class="batch-info">2026/04/13 起</div>
    </div>
    <div class="batch-box" style="background: #fff0f0; border-color: #ffdada;">
        <div class="batch-title"><span>區間三：41 張 (1.5%)</span><span id="dDisplay3"></span></div>
        <div class="batch-info">2026/04/14 起</div>
    </div>

    <button class="btn-calc" onclick="doTotalCalc()">重新計算詳細明細</button>

    <div id="res" class="result">
        <div class="sim-box">
            <div style="font-size:13px; color:#856404; font-weight:600;">💡 模擬 92張 借滿一年穩定收益</div>
            <div class="val-daily" id="simDaily" style="color: #d97706;">$0</div>
            <div style="font-size:12px; color:#997404;">預估每日實領 (僅扣手續費與稅)</div>
        </div>

        <div class="summary-box">
            <div style="font-size:14px; color:#0056b3; font-weight:600;">當前區間平均實領日收</div>
            <div class="val-daily" id="totalDaily"></div>
            <div style="font-size:14px; color:#1c1c1e; margin-top:10px; font-weight:600;">合併實領總額 (Net)</div>
            <div class="val-big" id="totalNet"></div>
        </div>

        <div class="detail-card">
            <div class="sub-title">各區間原始收益 (Gross)</div>
            <div class="line"><span>1張 (1.5%)</span><span id="g1"></span></div>
            <div class="line"><span>50張 (1.25%)</span><span id="g2"></span></div>
            <div class="line"><span>41張 (1.5%)</span><span id="g3"></span></div>
            <div class="line" style="border-top:1px dashed #ccc; padding-top:4px; margin-top:4px; font-weight:700;">
                <span>總計原始利息</span><span id="sumGross"></span>
            </div>
        </div>

        <div class="detail-card">
            <div class="sub-title">合併代扣稅費明細</div>
            <div class="line"><span>手續費 (20%)</span><span id="sumFee"></span></div>
            <div class="line" style="color:var(--ios-red);"><span>所得稅 (40%)</span><span id="sumTax"></span></div>
            <div class="line" style="color:var(--ios-gray); font-style: italic;"><span>二代健保 (免徵)</span><span>$0</span></div>
        </div>
    </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxi2Xm_MZ1Bak8sAIfC-MiPaHERwuqpz8eSh8yRUy5efO8sa6Mur_XJ95BHhqYtKnJ7ww/exec';

document.getElementById('endDate').valueAsDate = new Date();

async function fetchPrice() {
    const btn = document.querySelector('.btn-fetch');
    btn.innerText = "連線中...";
    try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        let price = data.chart?.result[0]?.meta?.regularMarketPrice || data.price || data;
        if (price && !isNaN(price)) {
            document.getElementById('price').value = price;
            doTotalCalc();
            btn.innerText = "抓取成功";
        }
    } catch (e) { btn.innerText = "失敗"; }
    finally { setTimeout(() => { btn.innerText = "雲端抓取"; }, 2000); }
}

function getGrossInfo(lots, price, rate, startStr, endStr) {
    const start = new Date(startStr);
    const end = new Date(endStr);
    const diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
    if (diffDays <= 0) return { gross: 0, days: 0 };
    const gross = Math.round((lots * 1000 * price * rate / 365) * diffDays);
    return { gross, days: diffDays };
}

function doTotalCalc() {
    const P = parseFloat(document.getElementById('price').value) || 0;
    const endStr = document.getElementById('endDate').value;
    
    // 計算三個區間
    const b1 = getGrossInfo(1, P, 0.015, "2026-04-13", endStr);
    const b2 = getGrossInfo(50, P, 0.0125, "2026-04-13", endStr);
    const b3 = getGrossInfo(41, P, 0.015, "2026-04-14", endStr);

    document.getElementById('dDisplay1').innerText = b1.days + " 天";
    document.getElementById('dDisplay2').innerText = b2.days + " 天";
    document.getElementById('dDisplay3').innerText = b3.days + " 天";
    
    document.getElementById('g1').innerText = "$" + b1.gross.toLocaleString();
    document.getElementById('g2').innerText = "$" + b2.gross.toLocaleString();
    document.getElementById('g3').innerText = "$" + b3.gross.toLocaleString();

    const totalGross = b1.gross + b2.gross + b3.gross;
    const totalFee = Math.round(totalGross * 0.2);
    const baseForTax = totalGross - totalFee;
    
    let totalTax = 0;
    if (baseForTax >= 20000) {
        totalTax = Math.round(baseForTax * 0.4);
    }
    
    const finalNet = totalGross - totalFee - totalTax;
    const maxDays = Math.max(b1.days, b2.days, b3.days, 1);
    
    document.getElementById('sumGross').innerText = "$" + totalGross.toLocaleString();
    document.getElementById('sumFee').innerText = "-$" + totalFee.toLocaleString();
    document.getElementById('sumTax').innerText = "-$" + totalTax.toLocaleString();
    document.getElementById('totalDaily').innerText = "$" + Math.floor(finalNet / maxDays).toLocaleString();
    document.getElementById('totalNet').innerText = "$" + finalNet.toLocaleString();

    // 模擬 92張 借滿一年收益
    const simGross = (1 * 1000 * P * 0.015) + (50 * 1000 * P * 0.0125) + (41 * 1000 * P * 0.015);
    const simFee = simGross * 0.2;
    const simBase = simGross - simFee;
    let sTax = 0;
    if (simBase >= 20000) { sTax = simBase * 0.4; }
    const simNetYearly = simGross - simFee - sTax;
    document.getElementById('simDaily').innerText = "$" + Math.floor(simNetYearly / 365).toLocaleString();
}

window.onload = fetchPrice;
</script>
</body>
</html>
